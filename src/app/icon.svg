    <rect x="21" y="7"  width="6"  height="2"/>
    <rect x="3"  y="9"  width="10" height="2"/>
    <rect x="19" y="9"  width="10" height="2"/>
    <rect x="3"  y="11" width="26" height="2"/>
    <rect x="3"  y="13" width="26" height="2"/>
