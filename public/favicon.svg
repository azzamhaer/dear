<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#FBF7F1"/>
  <!-- Pixel heart, 16x16 grid, dusty pink -->
  <g fill="#D4A5A5">
    <rect x="2"  y="3"  width="3" height="1"/>
    <rect x="11" y="3"  width="3" height="1"/>
    <rect x="1"  y="4"  width="5" height="1"/>
    <rect x="10" y="4"  width="5" height="1"/>
    <rect x="1"  y="5"  width="14" height="1"/>
    <rect x="1"  y="6"  width="14" height="1"/>
    <rect x="2"  y="7"  width="12" height="1"/>
    <rect x="3"  y="8"  width="10" height="1"/>
    <rect x="4"  y="9"  width="8"  height="1"/>
    <rect x="5"  y="10" width="6"  height="1"/>
    <rect x="6"  y="11" width="4"  height="1"/>
    <rect x="7"  y="12" width="2"  height="1"/>
  </g>
  <!-- Highlight (lighter pink) for cuteness -->
  <g fill="#F4E2E2">
    <rect x="3" y="5" width="1" height="1"/>
    <rect x="2" y="6" width="2" height="1"/>
    <rect x="3" y="7" width="1" height="1"/>
  </g>
</svg>
